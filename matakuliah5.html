<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a3a5f;
            --accent: #d4af37;
            --bg: #f4f7fa;
            --text: #2d3748;
        }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 25px; 
        }
        .main-card {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #e2e8f0;
        }
        .top-banner {
            background: linear-gradient(135deg, var(--primary) 0%, #001f3f 100%);
            color: white; padding: 35px; position: relative;
        }
        .top-banner::after {
            content: '\f1c0'; font-family: 'Font Awesome 5 Free'; font-weight: 900;
            position: absolute; right: 40px; top: 20px; font-size: 8rem; opacity: 0.1;
        }
        .course-meta {
            display: flex; gap: 20px; margin-top: 15px; font-size: 0.9rem;
        }
        .meta-item {
            background: rgba(255,255,255,0.15); padding: 5px 15px; border-radius: 50px;
            backdrop-filter: blur(5px); display: flex; align-items: center; gap: 8px;
        }
        .content-section { padding: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .info-block {
            background: #fff; border: 1px solid #edf2f7; padding: 20px; border-radius: 15px;
            border-top: 4px solid var(--accent);
        }
        .topic-list { list-style: none; padding: 0; margin: 0; }
        .topic-list li {
            padding: 12px 0; border-bottom: 1px solid #f0f4f8;
            display: flex; align-items: center; gap: 12px; font-size: 0.95rem;
        }
        .topic-list li:last-child { border: none; }
        .topic-list i { color: var(--accent); width: 20px; }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%; background: #48bb78;
            display: inline-block; margin-right: 8px;
        }
    </style>
</head>
<body>

            <p style="margin:5px 0 0 0; opacity: 0.9;">E-Filing & Digital Records Management</p>
            
            <div class="course-meta">
                <div class="meta-item"><i class="fas fa-clock"></i> 3 SKS</div>
                <div class="meta-item"><i class="fas fa-layer-group"></i> Semester 4</div>
                <div class="meta-item"><i class="fas fa-user-shield"></i> Standard ISO 15489</div>
            </div>
        </div>

        <div class="content-section">

                <h3 style="color: var(--primary); margin-top: 0;"><i class="fas fa-bullseye"></i> Capaian Pembelajaran</h3>
                <ul class="topic-list">
                    <li><i class="fas fa-check-circle"></i> Memahami Siklus Hidup Arsip Elektronik.</li>
                    <li><i class="fas fa-check-circle"></i> Menguasai Teknik Digitalisasi Dokumen.</li>
                    <li><i class="fas fa-check-circle"></i> Implementasi Database & Cloud Archiving.</li>
                    <li><i class="fas fa-check-circle"></i> Aspek Hukum & Keamanan Informasi (UU ITE).</li>
                </ul>
            </div>
