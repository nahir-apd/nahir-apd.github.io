<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat Kompetensi MET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: white; color: #333; }
        .card { border-left: 5px solid #28a745; background: #fffde7; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #ffe082; }
        h2 { color: #002d5a; margin-top: 0; display: flex; align-items: center; }
        h2 i { margin-right: 15px; color: #f57f17; }
        .info-grid { display: grid; grid-template-columns: 150px 10px auto; gap: 10px; margin-top: 20px; }
        .label { font-weight: bold; color: #555; }
        .status-badge { background: #f57f17; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-award"></i> Lisensi Sertifikasi (MET)</h2>
        <p>Master Trainer / Sertifikat Kompetensi Teknis yang dimiliki.</p>
        
        <div class="info-grid">
            <div class="label">Nama Pemegang</div><div>:</div><div>Nahiruddin</div>
            <div class="label">Jenis Lisensi</div><div>:</div><div>Metodologi Asesmen (MET)</div>
            <div class="label">Masa Berlaku</div><div>:</div><div>2026 - 2029</div>
            <div class="label">Status</div><div>:</div><div><span class="status-badge">Valid</span></div>
        </div>
    </div>
</body>
</html>
