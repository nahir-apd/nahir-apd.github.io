<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Control Panel - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .admin-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        .user-avatar { width: 100px; height: 100px; background: #002d5a; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem; }
    </style>
</head>
<body>
    <div class="admin-card">
        <div class="user-avatar"><i class="fas fa-user-tie"></i></div>
        <h2>Nahiruddin, S.Si., M.Si.</h2>
        <p style="color: #666;">Administrator Utama</p>
        <hr style="margin: 20px 0; opacity: 0.1;">
        <p style="font-size: 0.8rem; background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 10px;">
            <i class="fas fa-shield-alt"></i> Sistem Berjalan Optimal (Version 1.2)
        </p>
    </div>
</body>
</html>
