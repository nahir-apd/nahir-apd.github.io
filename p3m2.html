<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .p3m-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; margin-bottom: 15px; transition: 0.3s; }
        .p3m-card:hover { border-color: #1a3a5f; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tag { display: inline-block; padding: 2px 8px; background: #e8f4fd; color: #1a3a5f; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2 style="color: #1a3a5f;"><i class="fas fa-flask"></i> Hibah Penelitian & P3M</h2>
    <div class="p3m-card">
        <div class="tag">INTERNAL PNUP 2024</div>
        <h4 style="margin:0;">Implementasi Sistem Arsip Digital Berbasis Blockchain di Politeknik</h4>
        <p style="color: #666; font-size: 0.9rem;">Ketua Peneliti: Pak Nahiruddin, S.Pd., M.Pd.</p>
    </div>
    <div class="p3m-card">
        <div class="tag">PENGABDIAN MASYARAKAT</div>
        <h4 style="margin:0;">Pelatihan Literasi Digital bagi Staf Administrasi Kelurahan di Makassar</h4>
        <p style="color: #666; font-size: 0.9rem;">Status: Terlaksana (Mei 2024)</p>
    </div>
</body>
</html>
