<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .cert { display: flex; align-items: center; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 6px solid #d4af37; }
        .cert-icon { font-size: 2.5rem; color: #d4af37; margin-right: 20px; }
    </style>
</head>
<body>
    <h2 style="color: #1a3a5f;"><i class="fas fa-certificate"></i> Kekayaan Intelektual & Publikasi</h2>
    <div class="cert">
        <i class="fas fa-file-signature cert-icon"></i>
        <div>
            <strong style="font-size: 1.1rem;">HAKI: Modul Praktikum Statistika Digital</strong><br>
            <small>Nomor: EC002024105XXX | Jenis: Karya Tulis (Modul)</small>
        </div>
    </div>
    <div class="cert" style="border-left-color: #1a3a5f;">
        <i class="fas fa-journal-whills cert-icon" style="color: #1a3a5f;"></i>
        <div>
            <strong style="font-size: 1.1rem;">Jurnal SINTA 2: Digital Office Transformation</strong><br>
            <small>Volume 12, No 2 | ISSN: 2548-XXXX</small>
        </div>
    </div>
</body>
</html>
