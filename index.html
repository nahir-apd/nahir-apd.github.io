<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Eksekutif APD - Nahiruddin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sidebar: #0f172a;
            --accent: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --frame-bg: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #bebebe;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--frame-bg); height: 100vh; display: flex; overflow: hidden; }

        /* --- KOLOM 1: SIDEBAR --- */
        .sidebar { 
            width: 320px; background: var(--bg-sidebar); color: var(--text-main); 
            display: flex; flex-direction: column; z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.3);
        }

        .sidebar-header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header h2 { font-family: 'Poppins'; font-size: 1.5rem; color: var(--accent); letter-spacing: 1px; }

        .menu-container { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; }
        
        /* ANIMASI PULSE (Dashboard, Download, Materi saat Aktif) */
        .btn-pulse {
            width: 100%; padding: 15px; background: rgba(14, 165, 233, 0.1);
            border: 2px solid var(--accent); color: var(--accent);
            border-radius: 10px; font-weight: 800; cursor: pointer; margin-bottom: 15px;
            animation: pulseEffect 2s infinite; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        @keyframes pulseEffect {
            0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4); transform: scale(1); }
            70% { box-shadow: 0 0 12px 5px rgba(14, 165, 233, 0); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); transform: scale(1); }
        }

        .menu-label { 
            font-size: 0.7rem; color: #475569; font-weight: 800; 
            margin: 25px 0 10px 10px; text-transform: uppercase; letter-spacing: 1.5px;
        }

        .nav-item { 
            width: 100%; border: none; background: transparent; color: var(--text-muted);
            padding: 12px 15px; text-align: left; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            border-radius: 8px; transition: 0.3s; margin-bottom: 4px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; padding-left: 20px; }

        .chevron { width: 10px; height: 10px; transition: transform 0.4s ease; fill: none; stroke: currentColor; stroke-width: 3; }
        .rotated { transform: rotate(180deg); }

        /* Dropdown Materi */
        .sub-menu { 
            max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0, 1, 0, 1);
            background: rgba(0,0,0,0.2); border-radius: 8px;
        }
        .sub-menu.open { max-height: 200px; transition: max-height 0.5s ease-in; margin-bottom: 10px; }

        .sub-link { 
            display: block; width: 100%; padding: 10px 15px 10px 45px; color: #64748b;
            text-decoration: none; border: none; background: transparent;
            text-align: left; cursor: pointer; font-size: 0.85rem; transition: 0.2s;
        }
        .sub-link:hover { color: white; background: rgba(255,255,255,0.05); }

        /* --- KOLOM 2: KONTEN DENGAN BINGKAI 3D --- */
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 25px; gap: 20px; }

        /* Bingkai Atas Dimensi Tiga */
        .top-frame-3d { 
            padding: 20px 40px; background: var(--frame-bg); border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .top-frame-3d h3 { color: #475569; font-family: 'Poppins'; }

        /* Bingkai Konten Utama Dimensi Tiga */
        .content-frame-3d { 
            flex: 1; background: var(--frame-bg); border-radius: 20px;
            padding: 15px;
            box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
            border: 5px solid var(--frame-bg);
            display: flex; position: relative;
        }

        iframe { width: 100%; height: 100%; border: none; border-radius: 10px; background: white; display: none; }
        .welcome-msg { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; color: #94a3b8; }

        footer { padding: 10px; text-align: center; font-size: 0.7rem; color: #475569; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2>NAHIRUDDIN</h2>
    </div>

    <div class="menu-container">
        <button id="btn-dash" class="btn-pulse" onclick="activatePulse('btn-dash'); goHome()">
            <span>🏠 DASHBOARD SYSTEM</span>
        </button>

        <div class="menu-label">Sumber Belajar</div>
        
        <button id="btn-down" class="nav-item" onclick="activatePulse('btn-down'); loadPage('silabus.html', 'Download & Silabus')">
            <span>📁 Download & Silabus</span>
        </button>

        <button id="btn-mate" class="nav-item" onclick="toggleMateri(this)">
            <span>📖 Materi</span>
            <svg class="chevron" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5"/></svg>
        </button>
        <div id="materi-drop" class="sub-menu">
            <button class="sub-link" onclick="loadPage('mat1.html', 'Materi 1')">Materi 1</button>
            <button class="sub-link" onclick="loadPage('mat2.html', 'Materi 2')">Materi 2</button>
        </div>

        <div class="menu-label">Kuis & Evaluasi</div>
        <button class="nav-item" onclick="toggleMenu('kuis-drop', this)">
            <span>📝 Kuis Akademik</span>
            <svg class="chevron" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5"/></svg>
        </button>
        <div id="kuis-drop" class="sub-menu">
            <button class="sub-link" onclick="loadPage('kuis1.html', 'Kuis 1')">Kuis 1</button>
            <button class="sub-link" onclick="loadPage('kuis2.html', 'Kuis 2')">Kuis 2</button>
        </div>

        <div class="menu-label">Laporan Hasil</div>
        <button class="sub-link" onclick="loadPage('rek2.html', 'Rekap Kuis 2')">📊 Rekap Kuis 2</button>

        <div class="menu-label">Pengaturan</div>
        <button class="nav-item" onclick="toggleMenu('admin-drop', this)">
            <span>⚙️ Pengaturan Admin</span>
            <svg class="chevron" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5"/></svg>
        </button>
        <div id="admin-drop" class="sub-menu">
            <button class="sub-link" onclick="loadPage('profil.html', 'Profil Dosen')">Profil Dosen</button>
        </div>
    </div>
    <footer>PNUP 2026</footer>
</div>

<div class="main-content">
    <div class="top-frame-3d">
        <h3 id="top-title">BERANDA</h3>
        <div style="font-size: 0.7rem; font-weight: 800; color: #0ea5e9;">SISTEM ONLINE</div>
    </div>

    <div class="content-frame-3d">
        <div id="welcome-msg" class="welcome-msg">
            <p>Silakan pilih menu untuk menampilkan materi.</p>
        </div>
        <iframe id="main-frame"></iframe>
    </div>
</div>

<script>
    // Fungsi untuk mengubah tombol menjadi mode Pulse saat aktif
    function activatePulse(id) {
        // Reset semua ke style normal
        document.getElementById('btn-dash').className = 'nav-item';
        document.getElementById('btn-down').className = 'nav-item';
        document.getElementById('btn-mate').className = 'nav-item';
        
        // Aktifkan pulse pada ID yang dipilih
        document.getElementById(id).className = 'btn-pulse';
    }

    function toggleMateri(btn) {
        activatePulse('btn-mate');
        const menu = document.getElementById('materi-drop');
        const icon = btn.querySelector('.chevron');
        menu.classList.toggle('open');
        icon.classList.toggle('rotated');
    }

    function toggleMenu(id, btn) {
        const menu = document.getElementById(id);
        const icon = btn.querySelector('.chevron');
        const isOpen = menu.classList.contains('open');

        document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('open'));
        document.querySelectorAll('.chevron').forEach(c => c.classList.remove('rotated'));

        if (!isOpen) {
            menu.classList.add('open');
            icon.classList.add('rotated');
        }
    }

    function loadPage(url, title) {
        document.getElementById('welcome-msg').style.display = 'none';
        const frame = document.getElementById('main-frame');
        frame.style.display = 'block';
        frame.src = url;
        document.getElementById('top-title').innerText = title.toUpperCase();
    }

    function goHome() {
        document.getElementById('main-frame').style.display = 'none';
        document.getElementById('welcome-msg').style.display = 'flex';
        document.getElementById('top-title').innerText = "BERANDA";
    }
</script>

</body>
</html>
