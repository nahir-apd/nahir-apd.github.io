<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f4f7f6; }
        .premium-header { padding: 40px 25px; border-radius: 15px 15px 0 0; color: white; text-align: left; }
        .badge-asesor { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; letter-spacing: 1px; font-weight: bold; }
        .skema-container { background: white; padding: 25px; border-radius: 0 0 15px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .skema-table { width: 100%; border-collapse: collapse; }
        .skema-table th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; color: #888; font-size: 0.85rem; }
        .skema-table td { padding: 15px; border-bottom: 1px solid #f9f9f9; }
        .icon-circle { width: 30px; height: 30px; background: #e8f4fd; color: #001f3f; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; margin-right: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="premium-header" style="background: linear-gradient(135deg, #001f3f 0%, #333 100%);">
        <span class="badge-asesor">OFFICIAL ASESOR BREADCRUMB</span>
        <h1 style="margin: 15px 0 5px 0;">LSP P3 Politeknik Negeri Ujung Pandang</h1>
        <p style="opacity: 0.8;">Asesor Kompetensi Eksternal / P3</p>
    </div>
    <div class="skema-container">
        <h3 style="color: var(--dark); margin-bottom: 20px;"><i class="fas fa-list-check"></i> Daftar Skema & Lisensi</h3>
        <table class="skema-table">
            <thead>
                <tr><th>Nama Skema / Lisensi</th><th>Kualifikasi</th><th>Target Asesi</th></tr>
            </thead>
            <tbody>
                <tr>
                    <td><div class="icon-circle"><i class="fas fa-check"></i></div> <strong>Skema Digital Administration</strong></td>
                    <td><span style="color:#666">Level VI (Diploma)</span></td>
                    <td><span class="badge-asesor" style="background:#eee; color:#333; letter-spacing:0;">Mahasiswa APD</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
