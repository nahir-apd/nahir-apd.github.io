<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 30px; line-height: 1.6; }
        .pub-row { padding: 20px; border-bottom: 1px solid #edf2f7; display: flex; gap: 20px; align-items: flex-start; }
        .pub-row:hover { background: #f8fafc; }
        .pub-date { background: #1a3a5f; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; min-width: 80px; text-align: center; }
        .pub-title { font-size: 1.1rem; font-weight: bold; color: #2d3748; margin: 0 0 5px 0; }
        .pub-meta { font-size: 0.85rem; color: #718096; font-style: italic; }
        .badge-sinta { background: #d4af37; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-left: 10px; }
    </style>
</head>
<body>
    <h2 style="color: #1a3a5f; border-bottom: 3px solid #d4af37; padding-bottom: 10px;">Daftar Jurnal Terindeks</h2>
    
    <div class="pub-row">
        <div class="pub-date">Mei 2024</div>
        <div>
            <div class="pub-title">Analysis of Digital Literacy on Administrative Performance <span class="badge-sinta">SINTA 2</span></div>
            <div class="pub-meta">Jurnal Pendidikan Bisnis dan Administrasi, Vol 10 No 2</div>
        </div>
    </div>

    <div class="pub-row">
        <div class="pub-date">Des 2023</div>
        <div>
            <div class="pub-title">Automated Filing System using Cloud Technology <span class="badge-sinta">SINTA 3</span></div>
            <div class="pub-meta">International Journal of Office Automation, Page 45-60</div>
        </div>
    </div>
</body>
</html>
