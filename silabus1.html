<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #fff; }
        .step { display: flex; margin-bottom: 20px; }
        .number { width: 40px; height: 40px; background: #d4af37; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; flex-shrink: 0; }
        .desc { border-bottom: 1px solid #eee; padding-bottom: 10px; width: 100%; }
    </style>
</head>
<body>
    <h2 style="color: #1a3a5f; border-bottom: 2px solid #d4af37; padding-bottom: 10px;">
        <i class="fas fa-file-pdf"></i> Rencana Pembelajaran Semester (RPS)
    </h2>
    <div class="step">
        <div class="number">1</div>
        <div class="desc"><strong>Analisis Kebutuhan Data:</strong> Mahasiswa mampu mengidentifikasi jenis data administrasi kantor.</div>
    </div>
    <div class="step">
        <div class="number">2</div>
        <div class="desc"><strong>Pengolahan Data Digital:</strong> Transformasi data manual ke dalam sistem database terpadu.</div>
    </div>
    <div class="step">
        <div class="number">3</div>
        <div class="desc"><strong>Visualisasi Dashboard:</strong> Teknik penyajian data untuk laporan eksekutif pimpinan.</div>
    </div>
</body>
</html>
