<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            min-height: 90vh; font-family: 'Segoe UI', sans-serif; padding: 30px; color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 30px;
        }
        .icon-box { width: 60px; height: 60px; background: #d4af37; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 20px; box-shadow: 0 0 20px rgba(212,175,55,0.4); }
        .topic { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #d4af37; }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="icon-box"><i class="fas fa-comments-dollar"></i></div>
        <h1>Korespondensi Bisnis</h1>
        <p>Seni berkomunikasi dalam ekosistem digital global.</p>
        <div class="topic"><strong>Email Etiquette:</strong> Tata laku surat elektronik profesional.</div>
        <div class="topic"><strong>Copywriting:</strong> Teknik menulis pesan bisnis yang persuasif.</div>
        <div class="topic"><strong>Virtual Meeting:</strong> Manajemen komunikasi video conference.</div>
    </div>
</body>
</html>
