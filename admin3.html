<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 25px; background: #f0f4f8; }
        .cert-card { 
            background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px;
            display: flex; align-items: center; border-right: 8px solid #1a3a5f;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .cert-icon { font-size: 2.5rem; color: #1a3a5f; margin-right: 20px; opacity: 0.8; }
        .cert-info h4 { margin: 0; color: #1a3a5f; }
        .cert-info p { margin: 5px 0 0 0; font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>
    <h2 style="color: #1a3a5f;"><i class="fas fa-award"></i> Sertifikasi & Kompetensi</h2>
    
    <div class="cert-card">
        <i class="fas fa-chalkboard-teacher cert-icon"></i>
        <div class="cert-info">
            <h4>Sertifikat Pendidik (Serdos)</h4>
            <p>Nomor Registrasi: 12345XXXXX | Tahun: 2021</p>
        </div>
    </div>

    <div class="cert-card" style="border-right-color: #d4af37;">
        <i class="fas fa-user-check cert-icon" style="color: #d4af37;"></i>
        <div class="cert-info">
            <h4>Asesor Kompetensi LSP</h4>
            <p>Bidang: Administrasi Perkantoran | Berlaku s/d: 2027</p>
        </div>
    </div>
</body>
</html>
