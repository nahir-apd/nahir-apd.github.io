<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materi Eksklusif - Nahiruddin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #002d5a;
            --accent: #28a745;
            --light-bg: #f4f7f6;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--light-bg); 
            margin: 0; padding: 40px 20px; 
            color: #2d3436; 
        }

        .container { max-width: 1000px; margin: auto; }

        /* Header Mewah */
        .header-wrapper {
            background: linear-gradient(135deg, var(--primary) 0%, #004a99 100%);
            padding: 40px;
            border-radius: 20px;
            color: white;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 45, 90, 0.2);
            position: relative;
            overflow: hidden;
        }

        .header-wrapper::after {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 150px; height: 150px; background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .header-wrapper h1 { margin: 0; font-size: 2.2rem; letter-spacing: 1px; }
        .header-wrapper p { opacity: 0.8; margin-top: 10px; font-weight: 300; }

        /* Card Materi */
        .materi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .materi-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            border-left: 5px solid transparent;
        }

        .materi-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-left: 5px solid var(--accent);
        }

        .icon-box {
            width: 60px; height: 60px;
            background: rgba(40, 167, 69, 0.1);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }

        .icon-box i { font-size: 1.5rem; color: var(--accent); }

        .materi-card h3 { margin: 0 0 10px; color: var(--primary); font-size: 1.3rem; }
        .materi-card p { font-size: 0.9rem; color: #636e72; line-height: 1.6; flex-grow: 1; }

        .btn-action {
            margin-top: 20px;
            padding: 12px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-action:hover { background: var(--accent); }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #e1f5fe;
            color: #01579b;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="dynamic-content">
        </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const mk = urlParams.get('mk');

    const dataMK = {
        'st': {
            name: "Statistika Terapan",
            tag: "Data Analysis",
            desc: "Eksplorasi data numerik untuk pengambilan keputusan administratif yang akurat.",
            topics: ["Analisis Deskriptif", "Uji Hipotesis", "Regresi Linear", "Uji Validitas"]
        },
        'aks': {
            name: "App. Komputer Spreadsheet",
            tag: "Basic Skill",
            desc: "Fundamen pengoperasian Microsoft Excel untuk efisiensi administrasi perkantoran.",
            topics: ["Logic Function", "VLOOKUP Master", "Text Formatting", "Reporting"]
        },
        'ads': {
            name: "Advanced Digital Spreadsheet",
            tag: "Expert Level",
            desc: "Optimasi data tingkat lanjut dengan Pivot Table, Macro, dan Power Query.",
            topics: ["Pivot Advanced", "Power Query", "Dashboarding", "VBA Intro"]
        },
        'akd': {
            name: "App. Komputer Database",
            tag: "Data Management",
            desc: "Membangun sistem informasi data relasional yang terintegrasi dan aman.",
            topics: ["Database Design", "SQL Query", "Form Interface", "Relational Mapping"]
        }
    };

    const current = dataMK[mk] || dataMK['st'];
    
    document.getElementById('dynamic-content').innerHTML = `
        <div class="header-wrapper">
            <span style="background: var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem;">Mata Kuliah 2026</span>
            <h1>${current.name}</h1>
            <p>Dosen Pengampu: Nahiruddin, S.Pd., M.Pd. | APD - PNUP</p>
        </div>

        <div class="materi-grid">
            ${current.topics.map((topic, i) => `
                <div class="materi-card">
                    <span class="badge">${current.tag}</span>
                    <div class="icon-box"><i class="fas fa-layer-group"></i></div>
                    <h3>Modul ${i+1}</h3>
                    <p>${topic}: Pelajari konsep mendalam dan praktik implementasi pada kasus nyata.</p>
                    <a href="#" class="btn-action">Pelajari Materi <i class="fas fa-arrow-right" style="margin-left:8px"></i></a>
                </div>
            `).join('')}
        </div>
    `;
</script>

</body>
</html>
