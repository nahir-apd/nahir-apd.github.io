<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konten Mata Kuliah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: white; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; }
        
        /* Header Style */
        .header { border-bottom: 3px solid #28a745; padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { color: #002d5a; margin: 0; font-size: 1.8rem; }
        .header p { color: #666; margin: 5px 0 0; }

        /* Card Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { 
            background: #f8f9fa; border-radius: 12px; padding: 20px; 
            border: 1px solid #e1e4e8; transition: 0.3s; 
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: #28a745; }
        .card i { font-size: 2rem; color: #28a745; margin-bottom: 15px; }
        .card h3 { margin: 0 0 10px; color: #002d5a; }
        
        /* List Style */
        .materi-list { list-style: none; padding: 0; }
        .materi-list li { 
            padding: 12px; border-bottom: 1px solid #eee; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .materi-list li:last-child { border: none; }
        
        .btn-download { 
            background: #002d5a; color: white; padding: 6px 12px; 
            border-radius: 5px; text-decoration: none; font-size: 0.8rem; 
        }
        .btn-download:hover { background: #28a745; }

        .alert-info { background: #e7f3ff; border-left: 5px solid #2196F3; padding: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="content-area">
        <div class="header">
            <h1>Memuat Materi...</h1>
        </div>
    </div>
</div>

<script>
    // Fungsi untuk mengambil parameter dari URL (misal: materi.html?mk=st)
    const urlParams = new URLSearchParams(window.location.search);
    const mk = urlParams.get('mk');
    const contentArea = document.getElementById('content-area');

    const materiData = {
        'st': {
            title: "Statistika Terapan (ST)",
            desc: "Fokus pada pengolahan data, uji hipotesis, dan analisis regresi untuk administrasi.",
            icon: "fas fa-chart-line",
            list: ["Konsep Dasar Statistika", "Distribusi Frekuensi", "Uji Validitas & Reliabilitas", "Analisis Regresi Linear"]
        },
        'aks': {
            title: "Aplikasi Komputer Spreadsheet (AKS)",
            desc: "Penguasaan dasar Excel, fungsi logika, dan pengolahan tabel data perkantoran.",
            icon: "fas fa-table",
            list: ["Pengenalan Interface Excel", "Fungsi Aritmatika & Logika", "VLOOKUP & HLOOKUP Dasar", "Format Laporan Keuangan"]
        },
        'ads': {
            title: "Advanced Digital Spreadsheet (ADS)",
            desc: "Teknik tingkat lanjut: Pivot Table, Macro Dasar, dan Dashboard Interaktif.",
            icon: "fas fa-file-excel",
            list: ["Advanced Pivot Tables", "Power Query Essentials", "Data Visualization Dashboard", "Automasi dengan Macro/VBA"]
        },
        'akd': {
            title: "Aplikasi Komputer Database (AKD)",
            desc: "Manajemen data relasional menggunakan Microsoft Access atau sistem database sejenis.",
            icon: "fas fa-database",
            list: ["Konsep Entity Relationship (ERD)", "Membuat Tabel & Relationship", "Query Design & SQL Dasar", "Form & Reporting"]
        }
    };

    if (materiData[mk]) {
        const data = materiData[mk];
        contentArea.innerHTML = `
            <div class="header">
                <h1><i class="${data.icon}"></i> ${data.title}</h1>
                <p>Program Studi Administrasi Perkantoran Digital - PNUP</p>
            </div>
            <div class="alert-info">
                <strong>Deskripsi Mata Kuliah:</strong><br>${data.desc}
            </div>
            <h3>Daftar Materi Kuliah</h3>
            <ul class="materi-list">
                ${data.list.map((item, index) => `
                    <li>
                        <span><strong>Pertemuan ${index + 1}:</strong> ${item}</span>
                        <a href="#" class="btn-download"><i class="fas fa-download"></i> PDF</a>
                    </li>
                `).join('')}
            </ul>
            <div style="margin-top:40px; border-top:1px solid #eee; padding-top:20px; font-size:0.8rem; color:#999;">
                &copy; 2026 - Dosen Pengampu: Nahiruddin, S.Pd., M.Pd.
            </div>
        `;
    } else {
        contentArea.innerHTML = "<h1>Materi tidak ditemukan.</h1>";
    }
</script>

</body>
</html>
