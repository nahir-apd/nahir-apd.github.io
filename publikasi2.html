<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f6; }
        .pub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .pub-card { background: white; border-radius: 15px; padding: 25px; text-align: center; transition: 0.3s; border-bottom: 5px solid #1a3a5f; }
        .pub-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .pub-icon { font-size: 3rem; color: #d4af37; margin-bottom: 15px; }
        .btn-link { display: inline-block; margin-top: 15px; padding: 8px 20px; background: #1a3a5f; color: white; border-radius: 20px; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <h2 style="color: #1a3a5f; text-align: center;">Koleksi Publikasi Ilmiah</h2>
    <div class="pub-grid">
        <div class="pub-card">
            <i class="fas fa-book-reader pub-icon"></i>
            <h4>Buku Ajar: Statistika untuk APD</h4>
            <p style="font-size: 0.8rem; color: #777;">Penerbit: PNUP Press</p>
            <a href="#" class="btn-link">Lihat Detail</a>
        </div>
        <div class="pub-card">
            <i class="fas fa-globe-americas pub-icon"></i>
            <h4>International Journal of Digital Office</h4>
            <p style="font-size: 0.8rem; color: #777;">Scopus Indexed / Q3</p>
            <a href="#" class="btn-link">Kunjungi Link</a>
        </div>
    </div>
</body>
</html>
