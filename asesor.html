
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Asesor Dashboard - Nahiruddin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #001f3f; --gold: #c5a059; --accent: #28a745; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 30px; color: #333; }
        
        /* Glassmorphism Header */
        .premium-header {
            background: linear-gradient(135deg, var(--dark) 0%, #004a99 100%);
            padding: 40px; border-radius: 20px; color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); margin-bottom: 30px;
        }

        .badge-asesor {
            background: var(--gold); color: white; padding: 5px 15px;
            border-radius: 50px; font-size: 0.7rem; font-weight: bold; letter-spacing: 2px;
        }

        /* Skema Table Style */
        .skema-container {
            background: white; border-radius: 20px; padding: 0;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .skema-table { width: 100%; border-collapse: collapse; }
        .skema-table th { background: #f8f9fa; padding: 20px; text-align: left; color: var(--dark); border-bottom: 2px solid #eee; }
        .skema-table td { padding: 20px; border-bottom: 1px solid #f1f1f1; }
        
        .row-highlight:hover { background: #fcfcfc; }
        
        .icon-circle {
            width: 40px; height: 40px; background: rgba(40, 167, 69, 0.1);
            color: var(--accent); border-radius: 50%; display: inline-flex;
            align-items: center; justify-content: center; margin-right: 15px;
        }

        .btn-verifikasi {
            padding: 8px 15px; background: var(--dark); color: white;
            text-decoration: none; border-radius: 6px; font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div id="render-asesor">
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');

    const dbAsesor = {
        'pnup': {
            title: "LSP Politeknik Negeri Ujung Pandang",
            subtitle: "Asesor Kompetensi Internal - Administrasi Perkantoran Digital",
            skema: [
                ["Skema Digital Administration", "Level VI (Diploma)", "Mahasiswa APD"],
                ["Skema Teknisi Akuntansi", "Level V", "Mahasiswa Akuntansi"]
            ],
            color: "#001f3f"
        },
        'smk': {
            title: "LSP SMK Terakreditasi",
            subtitle: "Asesor Eksternal - Uji Kompetensi Keahlian (UKK)",
            skema: [
                ["Skema Junior Administrative Assistant", "Level II", "Siswa SMK AP"],
                ["Skema Sekretaris Junior", "Level II", "Siswa SMK AP"]
            ],
            color: "#0b5345"
        },
        'met': {
            title: "Lisensi Master Asesor (MET)",
            subtitle: "Master of Evidence and Test (MET) - BNSP Republik Indonesia",
            skema: [
                ["Sertifikat Kompetensi Asesor", "Berlaku s/d 2027", "No. Reg: MET.XXX"],
                ["Sertifikat Upgrading Asesor", "2024", "Verified"]
            ],
            color: "#7b241c"
        }
    };

    const cur = dbAsesor[type] || dbAsesor['pnup'];

    document.getElementById('render-asesor').innerHTML = `
        <div class="premium-header" style="background: linear-gradient(135deg, ${cur.color} 0%, #333 100%);">
            <span class="badge-asesor">OFFICIAL ASESOR BREADCRUMB</span>
            <h1 style="margin: 15px 0 5px 0;">${cur.title}</h1>
            <p style="opacity: 0.8;">${cur.subtitle}</p>
        </div>

        <h3 style="color: var(--dark); margin-bottom: 20px;"><i class="fas fa-list-check"></i> Daftar Skema & Lisensi</h3>
        
        <div class="skema-container">
            <table class="skema-table">
                <thead>
                    <tr>
                        <th>Nama Skema / Lisensi</th>
                        <th>Kualifikasi</th>
                        <th>Target Asesi</th>
                    </tr>
                </thead>
                <tbody>
                    ${cur.skema.map(s => `
                        <tr class="row-highlight">
                            <td><div class="icon-circle"><i class="fas fa-check"></i></div> <strong>${s[0]}</strong></td>
                            <td><span style="color:#666">${s[1]}</span></td>
                            <td><span class="badge-asesor" style="background:#eee; color:#333; letter-spacing:0;">${s[2]}</span></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
</script>
</body>
</html>
