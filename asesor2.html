<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesor LSP SMK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: white; color: #333; }
        .card { border-left: 5px solid #28a745; background: #f8f9fa; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #002d5a; margin-top: 0; display: flex; align-items: center; }
        h2 i { margin-right: 15px; color: #28a745; }
        .info-grid { display: grid; grid-template-columns: 150px 10px auto; gap: 10px; margin-top: 20px; }
        .label { font-weight: bold; color: #555; }
        .status-badge { background: #28a745; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-school"></i> Asesor LSP SMK (P1 & P3)</h2>
        <p>Data penugasan dan verifikasi kompetensi untuk jenjang Sekolah Menengah Kejuruan.</p>
        
        <div class="info-grid">
            <div class="label">Nama Asesor</div><div>:</div><div>Nahiruddin</div>
            <div class="label">No. Registrasi</div><div>:</div><div>MET.000.000000 2026</div>
            <div class="label">Lembaga</div><div>:</div><div>LSP SMK</div>
            <div class="label">Status</div><div>:</div><div><span class="status-badge">Aktif</span></div>
        </div>
    </div>
</body>
</html>
