<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: #f1f5f9; padding: 40px; font-family: 'Segoe UI', sans-serif; }
        .gold-border { border: 2px solid #d4af37; padding: 30px; border-radius: 0 50px 0 50px; background: rgba(255,255,255,0.02); }
        .title-box { background: #d4af37; color: #0f172a; display: inline-block; padding: 5px 20px; font-weight: bold; margin-bottom: 20px; border-radius: 4px; }
        .item-list { list-style: none; padding: 0; }
        .item-list li { margin-bottom: 20px; display: flex; align-items: center; border-bottom: 1px solid #1e293b; padding-bottom: 15px; }
        .item-list i { color: #d4af37; margin-right: 15px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="gold-border">
        <div class="title-box">CORE SUBJECT</div>
        <h2>Manajemen Perkantoran Digital</h2>
        <p style="opacity: 0.7;">Strategi pengelolaan kantor modern berbasis efisiensi teknologi.</p>
        <ul class="item-list">
            <li><i class="fas fa-microchip"></i> Otomasi Alur Kerja (Workflow Automation)</li>
            <li><i class="fas fa-cloud"></i> Pengelolaan Resource Berbasis Cloud</li>
            <li><i class="fas fa-shield-alt"></i> Protokol Keamanan Data Digital</li>
        </ul>
    </div>
</body>
</html>
