<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 25px; background: #f4f7fa; color: #333; }
        .quiz-container { background: white; max-width: 700px; margin: auto; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border-top: 6px solid #1a3a5f; }
        .quiz-header { background: #1a3a5f; color: white; padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        .quiz-body { padding: 30px; }
        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: #1a3a5f; }
        .option { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .option:hover { border-color: #d4af37; background: #fffdf5; }
        .option i { margin-right: 15px; color: #cbd5e1; }
        .option:hover i { color: #d4af37; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="quiz-header">
        <h3 style="margin:0;"><i class="fas fa-question-circle"></i> Lembar Ujian Online</h3>
        <span style="background: #d4af37; padding: 4px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: bold; color: #1a3a5f;">Waktu: 60 Menit</span>
    </div>
    <div class="quiz-body">
        <div class="question">1. Manakah di bawah ini yang merupakan komponen utama dari sistem otomatisasi perkantoran modern?</div>
        
        <div class="option"><i class="far fa-circle fa-lg"></i> <span>A. Mesin ketik manual tradisional</span></div>
        <div class="option"><i class="far fa-circle fa-lg"></i> <span>B. Penyimpanan berbasis Cloud Storage & Shared Drive</span></div>
        <div class="option"><i class="far fa-circle fa-lg"></i> <span>B. Pengarsipan dokumen menggunakan map kertas</span></div>
        <div class="option"><i class="far fa-circle fa-lg"></i> <span>D. Buku ekspedisi kurir manual</span></div>
    </div>
</div>

</body>
</html>
