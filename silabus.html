<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silabus Eksklusif - Nahiruddin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #002d5a;
            --accent: #28a745;
            --bg: #f8f9fa;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); margin: 0; padding: 40px 20px; color: #333; 
        }

        .container { max-width: 1000px; margin: auto; }

        /* Header Card */
        .header-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            border-top: 10px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-info h1 { margin: 0; color: var(--primary); font-size: 2rem; }
        .header-info p { margin: 5px 0 0; color: #666; font-size: 1.1rem; }

        /* Roadmap Style untuk RPS */
        .roadmap { position: relative; padding: 20px 0; }
        
        .roadmap-item {
            background: white;
            margin-bottom: 20px;
            padding: 25px;
            border-radius: 15px;
            display: flex;
            gap: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border-left: 5px solid var(--primary);
            transition: 0.3s;
        }

        .roadmap-item:hover { transform: scale(1.02); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }

        .week-circle {
            min-width: 60px; height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.9rem;
        }

        .content-text h3 { margin: 0 0 8px; color: var(--primary); }
        .content-text p { margin: 0; color: #636e72; font-size: 0.95rem; }

        /* Table Penilaian Mewah */
        .grade-card {
            background: var(--primary);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-top: 30px;
        }

        .grade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .grade-item {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }

        .grade-item h4 { margin: 0; font-size: 1.5rem; color: var(--accent); }
        .grade-item span { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        .btn-print {
            padding: 12px 25px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-print:hover { background: #218838; }
    </style>
</head>
<body>

<div class="container">
    <div id="silabus-content">
        </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const mk = urlParams.get('mk');

    const dataSilabus = {
        'st': {
            name: "Statistika Terapan",
            desc: "Rencana Pembelajaran Semester (RPS) TA 2026",
            weeks: [
                { w: "1-4", t: "Analisis Deskriptif", d: "Pengenalan data, distribusi frekuensi, dan visualisasi grafik." },
                { w: "5-8", t: "Uji Korelasi", d: "Mempelajari hubungan antar variabel dalam administrasi bisnis." },
                { w: "9-16", t: "Statistik Inferensial", d: "Pengujian hipotesis dan analisis regresi untuk prediksi." }
            ],
            grades: { t: "20%", k: "20%", uts: "30%", uas: "30%" }
        },
        'spreadsheet': {
            name: "Spreadsheet & Database",
            desc: "Kurikulum Berbasis Kompetensi Industri",
            weeks: [
                { w: "1-4", t: "Logic & Formulas", d: "Penguasaan IF bertingkat, VLOOKUP, dan manipulasi teks." },
                { w: "5-8", t: "Data Mining", d: "Manajemen database besar menggunakan Pivot dan Power Query." },
                { w: "9-16", t: "Professional Dashboard", d: "Pembuatan visualisasi data interaktif dan otomatisasi Macro." }
            ],
            grades: { t: "15%", k: "25%", uts: "25%", uas: "35%" }
        }
    };

    const cur = dataSilabus[mk] || dataSilabus['st'];

    document.getElementById('silabus-content').innerHTML = `
        <div class="header-card">
            <div class="header-info">
                <h1>${cur.name}</h1>
                <p>${cur.desc}</p>
            </div>
            <button class="btn-print" onclick="window.print()"><i class="fas fa-print"></i> Cetak RPS</button>
        </div>

        <h2 style="color: var(--primary); margin-left: 10px;">Roadmap Pembelajaran</h2>
        <div class="roadmap">
            ${cur.weeks.map(item => `
                <div class="roadmap-item">
                    <div class="week-circle">W ${item.w}</div>
                    <div class="content-text">
                        <h3>${item.t}</h3>
                        <p>${item.d}</p>
                    </div>
                </div>
            `).join('')}
        </div>

        <div class="grade-card">
            <h3><i class="fas fa-chart-pie"></i> Bobot Penilaian Akhir</h3>
            <div class="grade-grid">
                <div class="grade-item"><h4>${cur.grades.t}</h4><span>Tugas</span></div>
                <div class="grade-item"><h4>${cur.grades.k}</h4><span>Kuis</span></div>
                <div class="grade-item"><h4>${cur.grades.uts}</h4><span>UTS</span></div>
                <div class="grade-item"><h4>${cur.grades.uas}</h4><span>UAS</span></div>
            </div>
        </div>
    `;
</script>

</body>
</html>
